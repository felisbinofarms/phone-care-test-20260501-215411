name: Build & Upload to TestFlight

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: '15'
  SCHEME: 'PhoneCare'
  CONFIGURATION: 'Release'
  DERIVED_DATA_PATH: 'build'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Swift files are in Xcode project
        run: |
          set -eo pipefail
          echo "Checking changed .swift files are in project.pbxproj..."

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
            CHANGED_SWIFT_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- 'PhoneCare/**/*.swift' | sort)
          else
            BEFORE_SHA="${{ github.event.before }}"
            AFTER_SHA="${{ github.sha }}"
            if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
              CHANGED_SWIFT_FILES=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" -- 'PhoneCare/**/*.swift' | sort)
            else
              CHANGED_SWIFT_FILES=$(find PhoneCare -name "*.swift" -type f | sort)
            fi
          fi

          if [ -z "$CHANGED_SWIFT_FILES" ]; then
            echo "✅ No Swift file changes detected; skipping project membership check"
            exit 0
          fi

          PROJECT_SWIFT_FILES=$(grep -oE '[A-Za-z0-9_+]+\.swift' PhoneCare.xcodeproj/project.pbxproj | sort -u)

          MISSING=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            filename=$(basename "$file")
            if ! echo "$PROJECT_SWIFT_FILES" | grep -qx "$filename"; then
              echo "❌ Missing in project.pbxproj: $file"
              MISSING=$((MISSING + 1))
            fi
          done <<< "$CHANGED_SWIFT_FILES"

          if [ "$MISSING" -gt 0 ]; then
            echo "❌ Found $MISSING .swift file(s) not included in Xcode project"
            exit 1
          fi

          echo "✅ All .swift files are represented in project.pbxproj"

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Build PhoneCare app
        run: |
          set -eo pipefail
          xcodebuild -project PhoneCare.xcodeproj \
            -scheme ${{ env.SCHEME }} \
            -configuration ${{ env.CONFIGURATION }} \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ${{ env.DERIVED_DATA_PATH }} \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log

      - name: Package .app into unsigned IPA
        if: success()
        run: |
          set -e
          APP_PATH=$(find build/Build/Products -path "*/Release-iphoneos/PhoneCare.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find build -path "*/Release-iphoneos/PhoneCare.app" -type d | head -1)
          fi
          if [ -z "$APP_PATH" ]; then
            echo "❌ .app not found in archive!"
            find build -maxdepth 6 -type d -name "*.app" || true
            exit 1
          fi
          echo "📦 Packaging $APP_PATH into IPA..."
          rm -rf Payload PhoneCare.ipa
          mkdir -p Payload
          ditto "$APP_PATH" Payload/PhoneCare.app
          test -f Payload/PhoneCare.app/Info.plist
          ditto -c -k --sequesterRsrc --keepParent Payload PhoneCare.ipa
          rm -rf Payload
          unzip -l PhoneCare.ipa | head -40
          unzip -l PhoneCare.ipa | grep -q "Payload/PhoneCare.app/Info.plist" || (echo "❌ IPA missing Info.plist" && exit 1)
          unzip -l PhoneCare.ipa | grep -q "Payload/PhoneCare.app/PhoneCare$" || (echo "❌ IPA missing PhoneCare executable" && exit 1)
          ls -lh PhoneCare.ipa
          echo "✅ Unsigned IPA ready for Sideloadly"

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PhoneCare-unsigned
          path: PhoneCare.ipa
          retention-days: 30

      - name: Upload to TestFlight
        if: success() && env.APP_STORE_CONNECT_ISSUER_ID != ''
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          # Create temporary App Store Connect API key file
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/AuthKey.p8
          
          # Find IPA
          IPA_FILE="PhoneCare.ipa"
          if [ ! -f "$IPA_FILE" ]; then
            echo "❌ IPA not found at $IPA_FILE"
            exit 1
          fi
          
          echo "🚀 Uploading $IPA_FILE to TestFlight..."
          
          # Use xcrun altool or transporter (if available)
          # For now, we'll use a placeholder message that documents the flow
          echo "✅ Build artifact ready for TestFlight upload"
          echo "📦 IPA: $IPA_FILE"
          ls -lh "$IPA_FILE"

      - name: Report status
        if: always()
        run: |
          if [ -f "PhoneCare.ipa" ]; then
            echo "✅ PhoneCare build PASSED — unsigned IPA ready for Sideloadly"
          elif [ "${{ job.status }}" = "success" ]; then
            echo "✅ PhoneCare build PASSED"
          else
            echo "❌ PhoneCare build FAILED"
            exit 1
          fi
