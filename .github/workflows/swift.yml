name: Swift

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-15

    steps:
    - uses: actions/checkout@v4
    - name: List available simulators
      run: |
        xcrun simctl list devices available | grep "iPhone" | head -20
    - name: Build
      run: |
        xcodebuild build \
          -project PhoneCare.xcodeproj \
          -scheme PhoneCare \
          -destination 'generic/platform=iOS Simulator' \
          -skipPackagePluginValidation \
          CODE_SIGNING_ALLOWED=NO
    - name: Run tests
      run: |
        SIM_NAME=$(xcrun simctl list devices available | grep "iPhone" | head -1 | sed 's/^[[:space:]]*//' | sed 's/ (.*//')
        echo "Using simulator: $SIM_NAME"
        xcodebuild test \
          -project PhoneCare.xcodeproj \
          -scheme PhoneCare \
          -destination "platform=iOS Simulator,name=$SIM_NAME" \
          -skipPackagePluginValidation \
          CODE_SIGNING_ALLOWED=NO
